<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Kiseok Lee Group</title>
  <meta name="description" content="Photos from the Kiseok Lee Group at Yonsei University." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    .gallery-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .gallery-grid figure { margin:0; border-radius:var(--radius); overflow:hidden; border:1px solid var(--line); }
    .gallery-grid .ph {
      aspect-ratio:4/3; display:grid; place-items:center; color:#fff; font-weight:600;
      background:linear-gradient(135deg,var(--teal-700),var(--teal-300)); text-align:center; padding:16px; font-size:0.95rem;
    }
    @media (max-width:900px){ .gallery-grid{ grid-template-columns:repeat(2,1fr);} }
    @media (max-width:560px){ .gallery-grid{ grid-template-columns:1fr;} }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container nav">
      <div class="brand">
        <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
          <img src="assets/logo.svg" alt="Kiseok Lee Group" class="logo-img" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'logo',textContent:'MEFE'}))" />
          <span class="brand-name" style="color:var(--teal-900);font-weight:800;">Kiseok Lee Group</span>
        </a>
      </div>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="research.html">Research</a>
        <a href="mission.html">Mission</a>
        <a href="team.html">Team</a>
        <a href="pi.html">PI</a>
        <a href="papers.html">Papers</a>
        <a href="gallery.html" class="active">Gallery</a>
        <a href="join.html">Join Us</a>
      </nav>
      <button class="nav-toggle" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <div class="page-head">
    <div class="container">
      <h1>Gallery</h1>
      <p class="sub">Photos will fill in as the lab grows from March 2027.</p>
    </div>
  </div>

  <section>
    <div class="container">
      <!-- TO ADD PHOTOS: drop files in assets/gallery/ and replace a placeholder with:
           <figure><img src="assets/gallery/name.jpg" alt="..." style="width:100%;display:block;aspect-ratio:4/3;object-fit:cover;"></figure> -->
      <div class="gallery-grid">
        <figure><div class="ph">Lab opening<br>March 2027</div></figure>
        <figure><div class="ph">Field &amp; sampling</div></figure>
        <figure><div class="ph">At the bench</div></figure>
        <figure><div class="ph">Team outings</div></figure>
        <figure><div class="ph">Conferences</div></figure>
        <figure><div class="ph">Celebrations</div></figure>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div>
        <div class="f-name">Kiseok Lee Group</div>
        <div class="f-sub">MEFE Lab · 미생물생태 기능설계 연구실 · Yonsei University</div>
      </div>
      <nav class="footer-links">
        <a href="research.html">Research</a>
        <a href="pi.html">PI</a>
        <a href="papers.html">Papers</a>
        <a href="join.html">Join Us</a>
        <a href="https://scholar.google.com/citations?user=UcMtC88AAAAJ&amp;hl=en" target="_blank" rel="noopener">Google Scholar</a>
      </nav>
    </div>
    <div class="container" style="margin-top:18px;color:#8fa3c8;font-size:0.85rem;">© 2027 Kiseok Lee Group · Yonsei University · Seoul, Korea</div>
  </footer>

  <script src="assets/nav.js"></script>

</html>
